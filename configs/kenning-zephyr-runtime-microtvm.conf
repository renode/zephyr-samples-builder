# Copied and merged from:
# - https://github.com/antmicro/kenning-zephyr-runtime/blob/082c4c5d77dd770ca99433d93355210ddc220b39/demo_app/prj.conf
# - https://github.com/antmicro/kenning-zephyr-runtime/blob/082c4c5d77dd770ca99433d93355210ddc220b39/demo_app/tvm.conf
#
# With a config that forces floating-point printf support.
